services:
  db:
    image: postgres:16-alpine
    container_name: cargo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cargoonerecord
    ports:
      - "5433:5432"
    volumes:
      - cargo_pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: cargo-one-record-api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=jdbc:postgresql://db:5432/cargoonerecord
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - JWT_SECRET=cargo-one-record-secret-key-must-be-at-least-256-bits-long-for-hs256
      - COMPANY_IDENTIFIER=https://cargo.example.com
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  cargo_pg_data: